<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动中心 | KotoneClub</title>
    <style>
        :root {
            --steam-bg-top: #1b2838;
            --steam-bg-bottom: #171a21;
            --steam-text-main: #c6d4df;
            --steam-text-muted: #8ba0b2;
            --steam-blue-bright: #67c1f5;
            --steam-card-bg: rgba(0, 0, 0, 0.3);
            --steam-header-bg: #171a21;
        }

        body {
            margin: 0;
            background: linear-gradient(to bottom, var(--steam-bg-top) 0%, var(--steam-bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--steam-text-main);
            font-family: "Motiva Sans", Arial, sans-serif;
        }

        /* 统一的顶部导航 */
        .header-bar {
            background: var(--steam-header-bg);
            height: 104px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 15%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-main { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: #fff; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; margin-top: 10px; }
        .nav-links a { color: #dcdedf; text-decoration: none; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links a:hover { color: #fff; }
        .nav-links a.active { color: #fff; border-bottom: 2px solid var(--steam-blue-bright); padding-bottom: 2px; }

        /* 内容布局 */
        .main-container {
            max-width: 940px;
            margin: 30px auto;
            display: flex;
            gap: 20px;
        }

        /* 左侧列表：活动/项目展示 */
        .content-left { flex: 1; }
        .section-title { font-size: 14px; text-transform: uppercase; color: #fff; margin-bottom: 15px; display: block; }

        .store-row {
            display: flex;
            background: var(--steam-card-bg);
            margin-bottom: 5px;
            height: 50px;
            align-items: center;
            transition: background 0.2s;
            cursor: pointer;
            padding-right: 15px;
        }
        .store-row:hover { background: rgba(255,255,255,0.1); }
        .row-img { width: 132px; height: 50px; object-fit: cover; }
        .row-info { flex: 1; padding-left: 15px; }
        .row-title { font-size: 15px; color: #c7d5e0; }
        .row-type { font-size: 11px; color: var(--steam-text-muted); }
        .row-status { font-size: 13px; color: var(--steam-blue-bright); }

        /* 右侧侧边栏 */
        .sidebar { width: 210px; }
        .sidebar-box { background: rgba(0, 0, 0, 0.2); padding: 15px; margin-bottom: 20px; }
        .sidebar-header { font-size: 12px; color: var(--steam-blue-bright); border-bottom: 1px solid #38819c33; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; }
        .contact-link { color: var(--steam-blue-bright); text-decoration: none; font-size: 13px; display: block; margin-top: 10px; }
        .contact-link:hover { text-decoration: underline; }

        /* 统一的底部 */
        .footer { background: #171a21; padding: 60px 0; margin-top: 80px; font-size: 12px; color: var(--steam-text-muted); }
        .footer-inner { max-width: 940px; margin: 0 auto; border-top: 1px solid rgba(139,160,178,0.2); padding-top: 25px; }
    </style>
</head>
<body>

<header class="header-bar">
    <div class="header-main">
        <a href="index.html" class="logo">KOTONE CLUB</a>
    </div>
    <nav class="nav-links">
        <a href="index.html">首页</a>
        <a href="#">新闻资讯</a>
        <a href="activities.html" class="active">活动中心</a>
        <a href="#">社团简介</a>
    </nav>
</header>

<div class="main-container">
    <main class="content-left">
        <span class="section-title">全站项目归档</span>

        <div class="store-row" onclick="location.href='#'">
            <img src="https://via.placeholder.com/132x50/1b2838/67c1f5?text=BoxModifier" class="row-img">
            <div class="row-info">
                <div class="row-title">BoxModifier v2.0</div>
                <div class="row-type">Android / LSPosed / 脚本工具</div>
            </div>
            <div class="row-status">GitHub</div>
        </div>

        <div class="store-row" onclick="location.href='#'">
            <img src="https://via.placeholder.com/132x50/1b2838/67c1f5?text=Translation" class="row-img">
            <div class="row-info">
                <div class="row-title">等值理论在 JRPG 本地化中的实战应用</div>
                <div class="row-type">学术论文 / 翻译理论</div>
            </div>
            <div class="row-status">Read</div>
        </div>

        <div class="store-row" onclick="location.href='#'">
            <img src="https://via.placeholder.com/132x50/1b2838/67c1f5?text=Nioh+Guide" class="row-img">
            <div class="row-info">
                <div class="row-title">《仁王2》全动作模组拆解指南</div>
                <div class="row-type">游戏攻略 / Soulslike</div>
            </div>
            <div class="row-status">Online</div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="sidebar-box">
            <div class="sidebar-header">筛选</div>
            <p style="font-size: 11px;">按类型查找项目...</p>
        </div>

        <div class="sidebar-box">
            <div class="sidebar-header">联系琴音</div>
            <p style="font-size: 12px; margin: 0;">反馈建议或加入我们：</p>
            <a href="mailto:contact@kotone.club" class="contact-link">Contact Us</a>
        </div>
    </aside>
</div>

<footer class="footer">
    <div class="footer-inner">
        <p>© 2010-2026 MuttsuStar Entertainment. All rights reserved.</p>
        <div style="font-size: 18px; font-weight: bold; color: rgba(255,255,255,0.05); letter-spacing: 5px; margin-top: 20px;">MUTTSUSTAR</div>
    </div>
</footer>

</body>
</html>
