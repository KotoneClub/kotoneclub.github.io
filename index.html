<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KotoneClub | 琴音社 - 正在热门</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, var(--steam-bg-top) 0%, var(--steam-bg-bottom) 100%);
            background-attachment: fixed;
            color: var(--steam-text-main);
            font-family: "Motiva Sans", Arial, sans-serif;
        }

        /* 顶部装饰条 */
        .header-bar {
            background: #171a21;
            height: 104px;
            display: flex;
            align-items: center;
            padding: 0 15%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .logo { font-size: 26px; font-weight: bold; letter-spacing: 2px; color: #fff; text-decoration: none; }

        /* 主内容区域 */
        .content-hub {
            max-width: 940px;
            margin: 40px auto;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #fff;
        }

        /* 模拟 Steam 大图轮播卡片 */
        .hero-capsule {
            display: flex;
            background: #00000066;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            height: 350px;
        }

        .main-image {
            width: 616px;
            background: url('https://via.placeholder.com/616x353/1b2838/67c1f5?text=KotoneClub+Project') no-repeat center;
            background-size: cover;
        }

        .side-info {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .side-info h2 { font-size: 24px; margin: 0 0 10px 0; color: #fff; }

        .tag-row { display: flex; gap: 5px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.1); padding: 2px 8px; font-size: 11px; border-radius: 2px; color: var(--steam-blue-bright); }

        /* 按钮与状态 */
        .action-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            margin-top: 10px;
        }

        .status-btn {
            background: linear-gradient(to right, #75b022 5%, #588a1b 95%);
            color: #fff;
            padding: 8px 15px;
            border-radius: 2px;
            text-decoration: none;
            font-size: 15px;
        }

        .status-btn:hover { background: linear-gradient(to right, #8ed629 5%, #6aa621 95%); }

    </style>
</head>
<body>

<div class="header-bar">
    <a href="#" class="logo">KOTONE CLUB</a>
</div>

<div class="content-hub">
    <div class="section-title">精选与推荐</div>
    
    <div class="hero-capsule">
        <div class="main-image"></div>
        <div class="side-info">
            <div>
                <h2>琴音社：JRPG 汉化与交流计划</h2>
                <p style="font-size: 13px; color: var(--steam-text-muted);">
                    致力于推广硬核 JRPG 文化，从翻译理论到实战优化，我们一直在路上。
                </p>
                <div class="tag-row">
                    <span class="tag">翻译理论</span>
                    <span class="tag">JRPG</span>
                    <span class="tag">社区驱动</span>
                </div>
            </div>
            
            <div class="action-area">
                <span style="font-size: 12px;">现已开启招新</span>
                <a href="#" class="status-btn">立即加入</a>
            </div>
        </div>
    </div>

    </div>

</body>
</html>
